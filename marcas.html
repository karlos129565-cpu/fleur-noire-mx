<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleur Noire MX - Marcas</title>
 <link rel="stylesheet" href="style.css">
    <style>
       .marcas-grid {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 35px !important;
            max-width: 1200px !important;
            margin: 40px auto !important;
            padding: 0 40px !important;
            justify-items: center !important;
        }

        .marca-logo {
            width: 280px !important;
            height: 180px !important;
            object-fit: contain !important;
            background: #FFF !important;
            padding: 20px !important;
            border-radius: 12px !important;
            animation: flameo-marcas 1.8s ease-in-out infinite alternate !important;
            transition: all 0.3s ease !important;
        }

        @keyframes flameo-marcas {
            0% { 
                box-shadow: 0 0 15px #00f2ff,
                            0 0 30px #00f2ff,
                            0 0 45px #0099ff !important;
                transform: scale(1);
            }
            100% { 
                box-shadow: 0 0 35px #00f2ff,
                            0 0 70px #00f2ff,
                            0 0 105px #0099ff,
                            0 0 140px #0066ff !important;
                transform: scale(1.03);
            }
        }

        .marca-logo:hover {
            animation: flameo-hover 0.6s ease-in-out infinite alternate !important;
            transform: scale(1.1) !important;
            z-index: 10 !important;
            cursor: pointer !important;
        }

        @keyframes flameo-hover {
            0% { 
                box-shadow: 0 0 50px #00f2ff,
                            0 0 100px #00f2ff,
                            0 0 150px #0099ff !important;
            }
            100% { 
                box-shadow: 0 0 80px #00f2ff,
                            0 0 160px #00f2ff,
                            0 0 240px #0099ff !important;
            }
        }

        @media (max-width: 1024px) {
            .marcas-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 25px !important;
                padding: 0 20px !important;
            }
            .marca-logo {
                width: 220px !important;
                height: 150px !important;
            }
        }

        @media (max-width: 640px) {
            .marcas-grid {
                grid-template-columns: 1fr !important;
                gap: 20px !important;
            }
            .marca-logo {
                width: 280px !important;
                height: 160px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-marcas">
            <a href="index.html" class="btn-regresar">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </a>
            <h1>Nuestras Marcas</h1>
        </div>
        
        <div class="boton-historia-container">
            <a href="historia-marcas.html" class="btn-historia">
                Ver Historia de las Marcas →
            </a>
        </div>

    
  <div class="marcas-grid">
    <img src="./logo-adidas.webp" alt="Adidas" class="marca-logo">
    <img src="./logo-azzaro.webp" alt="Azzaro" class="marca-logo">
    <img src="./logo-calvin.webp" alt="Calvin Klein" class="marca-logo">
    <img src="./logo-ch.webp" alt="Carolina Herrera" class="marca-logo">
    <img src="./logo-ch2.webp" alt="Chanel" class="marca-logo">
    <img src="./logo-gio.webp" alt="Giorgio Armani" class="marca-logo">
    <img src="./logo-gucci.webp" alt="Gucci" class="marca-logo">
    <img src="./logo-hugo.webp" alt="Hugo Boss" class="marca-logo">
    <img src="./logo-jean.webp" alt="Jean Paul Gaultier" class="marca-logo">
    <img src="./logo-lacoste.webp" alt="Lacoste" class="marca-logo">
    <img src="./logo-lv.webp" alt="Louis Vuitton" class="marca-logo">
    <img src="./logo-mont.webp" alt="Mont Blanc" class="marca-logo">
    <img src="./logo-nautica.webp" alt="Nautica" class="marca-logo">
    <img src="./logo-paco.webp" alt="Paco Rabanne" class="marca-logo">
    <img src="./logo-polo.webp" alt="Ralph Lauren" class="marca-logo">
    <img src="./logo-valentino.webp" alt="Valentino" class="marca-logo">
    <img src="./logo-versace.webp" alt="Versace" class="marca-logo">
    <img src="./logo-yv.webp" alt="YSL" class="marca-logo">
</div>
