        body {
            margin: 0;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            color: #FFF;
            font-family: Georgia, serif;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            margin-bottom: 50px;
        }

        .marcas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
            align-items: center;
        }

        .marca-logo {
            max-width: 120px;
            width: 100%;
            height: auto;
            background: #0a0a0a; 
            padding: 12px;
            bording-radius: 10px;
            opacity: 0.7;
            transition: all 0.3s ease;
            border: 1px solid #1a1a1a;
            filter: grayscale(0.3);ç
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.1);
            
        }

        .marca-logo:hover {
            opacity: 1;
            transform: scale(1.15) translateY(-8px);
            border: 1px solid #00ffff;
            box-shadow:
                0 0 15px #00ffff,
                0 0 30px #00ffff,
                0 0 60px #00ffff, 
                0 8px 25px rgba(0, 255, 255, 0.3);        
        }

        .volver {
            display: inline-block;
            margin-top: 60px;
            padding: 12px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
