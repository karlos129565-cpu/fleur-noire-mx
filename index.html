<!DOCTYPE html>
<html>
<head>
  <title>Fleur Noire MX</title>
  <meta charset="UFT-8">
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <style>
  body { 
    margin: 0; 
    background: #000; 
    color: #fff; 
    font-family: Georgia, serif;
    min-height: 100vh;
  }
.hero {
  display: flex-direction: column;
  align-items: center;
  justify-content: center;
  min-heigth: 100vh;
  padding: 20px;
  text-align: center;
}
  
  .hero img { 
    height: 500px; 
    width: auto; 
    max-width: 90%;
    display: block; 
    margin: 0 
    object-fit: contain;
}
.hero h2 { 
    font-size: 2.2rem; 
    font-weight: 400;
    margin: 10px 0 0 0; 
    color: #fff4d00;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fireGlow 2s ease-in-out infinite alternate;
  text-shadow:
        0 0 10px #ff4d00,
        0 0 20px #ff4d00,
        0 0 30px #ff4500;
  }
   @keyframes fireGlow {
    0% {
      text-shadow:
        0 0 10px #ff4d00,
        0 0 20px #ff4d00,
        0 0 30px #ff4500,
        0 0 40px #ff000;
}
     to {
       text-shadow: 
          0 0 20px #ff8c00,
          0 0 30px #ff8c00,
          0 0 40px #ff6600,
          0 0 50px #ff4500,
          0 0 60px #ff0000;
    }
}
         
    </style>
</head>
<body>
  <div class="hero">
    <img src="favicon.jpeg" alt="Fleur Noire Logo">
 <h2> La Elegancia Nace en las Sombras</h2>
  </div>
</body>
</html>
