<!DOCTYPE html>
<html>
<head>
  <title>Fleur Noire MX</title>
  <meta charset="UFT-8">
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <style>
  body { 
    margin: 0; 
    background: #000; 
    color: #fff; 
    font-family: Georgia, serif;
    min-height: 100vh;
  }
.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
    gap: 20px; /
}

.hero img { 
    width: auto; 
    height: auto;
    max-width: 350px; 
    max-height: 45vh;
    display: block;
    margin: 0;
}

.hero h2 { 
    font-size: 2rem; 
    font-weight: 400;
    margin: 0; 
    color: #00d9ff;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fireGlow 1.5s ease-in-out infinite alternate;
    text-shadow: 
        0 0 10px #00d9ff,
        0 0 20px #00d9ff,
        0 0 30px #0099ff,
        0 0 50px #0088ff;
}

.btn-descubrir {
    display: inline-block;
    padding: 14px 35px;
    background: transparent;
    color: #00d9ff;
    border: 2px solid #00d9ff;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 
      0 0 15px rgba(0, 217, 255, 0.1);
}

.btn-descubrir:hover {
    background: #00d9ff;
    color: #000;
    box-shadow: 
      0 0 25px #00d9ff, 
      0 0 50px #0099ff;
    transform: translateY(-3px);
}
         
    </style>
</head>
<body>
  <div class="hero">
    <img src="favicon.jpeg" alt="Fleur Noire Logo">
 <h2> La Elegancia Nace en las Sombras</h2>
    <a href="#productos" class="btn-descubrir">DESCUBRIR MAS</a>
  </section>
  </div>
</body>
</html>
