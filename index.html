<!DOCTYPE html>
<html>
<head>
  <title>Fleur Noire MX</title>
  <meta charset="UFT-8">
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <style>
  body { 
    margin: 0; 
    background: #000; 
    color: #fff; 
    font-family: Georgia, serif;
    min-height: 100vh;
  }
.hero {
  display: flex-direction: column;
  align-items: center;
  justify-content: center;
  min-heigth: 100vh;
  padding: 20px;
}
  
  .hero img { 
    height: 500px; 
    width: auto; 
    display: block; 
    margin: 0 
}
.hero h2 { 
    font-size: 2.2rem; 
    font-weight: 400;
    margin-top: -0px 0 0 0; 
    color: #4db8ff;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fireGlow 2s ease-in-out infinite alternate;
  }
   @keyframes fireGlow {
    0% {
      text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 30px #4db8ff,
        0 0 40px #4db8ff;
}
     100% {
       text-shadow: 
          0 0 20px #fff,
          0 0 30px #b3e0ff,
          0 0 40px #b3e0ff,
          0 0 80px #4db8ff,
          0 0 100px #4db8ff;
    }
}
         
    </style>
</head>
<body>
  <div class="hero">
    <img src="favicon.jpeg" alt="Fleur Noire Logo">
 <h2> La Elegancia Nace en las Sombras</h2>
  </div>
</body>
</html>
